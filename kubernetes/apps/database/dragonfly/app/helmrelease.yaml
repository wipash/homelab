---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dragonfly-operator
spec:
  chartRef:
    kind: OCIRepository
    name: dragonfly-operator
  interval: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    crds:
      install: true
      keep: true
    rbacProxy:
      enabled: false
    manager:
      image:
        repository: ghcr.io/dragonflydb/operator
      resources:
        requests:
          cpu: 10m
        limits:
          memory: 128Mi
    serviceMonitor:
      enabled: true
      interval: 1m
      timeout: 10s
