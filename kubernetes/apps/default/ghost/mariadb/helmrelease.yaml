---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ghost-mariadb
spec:
  interval: 15m
  chartRef:
    kind: OCIRepository
    name: ghost-mariadb
  values:
    auth:
      existingSecret: ghost-secret
      username: ghost
      database: ghost
    primary:
      extraFlags: "--character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --character-set-collations=utf8mb4=utf8mb4_general_ci"
      persistence:
        existingClaim: ghost-mariadb
    resources:
      requests:
        cpu: 10m
        memory: 256Mi
      limits:
        memory: 512Mi
