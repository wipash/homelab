---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openclaw
spec:
  chartRef:
    kind: OCIRepository
    name: openclaw
  dependsOn: []
  interval: 15m
  values:
    controllers:
      openclaw:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          install-tools:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.3.28@sha256:5900559f795ef15ea2f0b1fc488726d9b27bb2de398424c14d13c9b1f1ff0d66
            command:
              - /bin/sh
              - -c
              - |
                set -e
                mkdir -p /home/node/.local/bin /home/node/.local/go

                echo "Starting tool installation..."

                # Install gh CLI if not present on PVC
                if [ ! -f /home/node/.local/bin/gh ]; then
                  echo "Installing gh CLI..."
                  cd /tmp
                  curl -fsSL https://github.com/cli/cli/releases/download/v2.61.0/gh_2.61.0_linux_amd64.tar.gz -o gh.tar.gz
                  tar xzf gh.tar.gz
                  cp gh_2.61.0_linux_amd64/bin/gh /home/node/.local/bin/
                  rm -rf gh.tar.gz gh_2.61.0_linux_amd64
                fi

                # Install Go if not present on PVC
                if [ ! -f /home/node/.local/go/bin/go ]; then
                  echo "Installing Go..."
                  cd /tmp
                  curl -fsSL https://go.dev/dl/go1.23.5.linux-amd64.tar.gz -o go.tar.gz
                  tar xzf go.tar.gz
                  mv go /home/node/.local/
                  rm -rf go.tar.gz
                fi

                # Install Homebrew if not present on PVC
                if [ ! -f /home/node/.local/homebrew/bin/brew ]; then
                  echo "Installing Homebrew..."
                  export HOMEBREW_PREFIX=/home/node/.local/homebrew
                  export HOMEBREW_CELLAR=/home/node/.local/homebrew/Cellar
                  export HOMEBREW_REPOSITORY=/home/node/.local/homebrew
                  mkdir -p $HOMEBREW_PREFIX
                  cd /tmp
                  git clone --depth 1 https://github.com/Homebrew/brew $HOMEBREW_PREFIX
                fi

                # Check if pip is available (either standalone or via python3 -m pip)
                set +e # Don't fail on pip errors
                if command -v pip3 >/dev/null 2>&1 || command -v pip >/dev/null 2>&1 || python3 -m pip --version >/dev/null 2>&1; then
                  echo "pip is available"
                else
                  echo "Installing pip..."
                  cd /tmp
                  curl -fsSL https://bootstrap.pypa.io/get-pip.py -o get-pip.py
                  python3 get-pip.py --user --no-warn-script-location --break-system-packages || \
                  python3 get-pip.py --user --no-warn-script-location || \
                  echo "pip install skipped (use python3 -m pip instead)"
                  rm -f get-pip.py
                fi
                set -e # Re-enable error checking

                echo "Tool installation complete"

                # Ensure config directory exists
                mkdir -p /home/node/.openclaw
                echo "Init container completed successfully"
        containers:
          app:
            image:
              repository: ghcr.io/openclaw/openclaw
              tag: 2026.3.28@sha256:5900559f795ef15ea2f0b1fc488726d9b27bb2de398424c14d13c9b1f1ff0d66
            command:
              - /bin/sh
              - -c
              - |
                # Set up openclawbot CLI symlink
                ln -sf /app/openclawbot.mjs /home/node/.local/bin/openclawbot
                # Start gateway in a restart loop so config-reload exits
                # don't cause container-level CrashLoopBackOff.
                # The gateway's "full process restart" spawns a replacement
                # child before exiting — kill it to avoid port conflicts.
                while true; do
                  # Auto-fix invalid config before starting
                  { echo "--- $(date -Iseconds) ---"; node dist/index.js doctor --fix 2>&1 || true; echo; } >> /home/node/.openclaw/doctor-startup.log
                  node dist/index.js gateway --bind lan
                  echo "Process exited ($?), cleaning up..."
                  pkill -f 'node dist/index.js gateway' 2>/dev/null || true
                  sleep 2
                done
            env:
              BROWSER_WS_ENDPOINT: "ws://localhost:9222"
              GOPATH: /home/node/go
              HOME: &homepath /home/node
              HOMEBREW_CELLAR: /home/node/.local/homebrew/Cellar
              HOMEBREW_PREFIX: /home/node/.local/homebrew
              HOMEBREW_REPOSITORY: /home/node/.local/homebrew
              OPENCLAW_GATEWAY_PORT: &port 18789
              PATH: /home/node/.local/bin:/home/node/.local/go/bin:/home/node/.local/homebrew/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
              PIP_BREAK_SYSTEM_PACKAGES: "1"
              TERM: xterm-256color
              TZ: &tz Pacific/Auckland
            envFrom:
              - secretRef:
                  name: openclaw
            resources:
              requests:
                cpu: 500m
                memory: 512Mi
              limits:
                cpu: 2000m
                memory: 4Gi
          chrome:
            image:
              repository: zenika/alpine-chrome
              tag: with-node
            command:
              - chromium-browser
              - --headless=new
              - --disable-gpu
              - --remote-debugging-address=0.0.0.0
              - --remote-debugging-port=9222
              - --no-sandbox
              - --disable-dev-shm-usage
              # Stealth flags to reduce bot detection
              - --disable-blink-features=AutomationControlled
              - --user-agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36
            env:
              TZ: *tz
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 1000m
                memory: 1Gi
      codeserver:
        containers:
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.112.0@sha256:ddd9b0b854fec5a3c65ec0095b5c59fb8505ad44d8a18d00d6fcf6a3179692dd
            env:
              TZ: *tz
            args:
              [
                "--auth",
                "none",
                "--user-data-dir",
                "/home/node/.vscode",
                "--extensions-dir",
                "/home/node/.vscode",
                "--port",
                "12321",
                "/config",
              ]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi
    defaultPodOptions:
      shareProcessNamespace: true
      securityContext:
        runAsUser: 1000
        runAsGroup: 100
        fsGroup: 100
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: openclaw
        ports:
          http:
            port: *port
      codeserver:
        controller: codeserver
        ports:
          http:
            port: 12321

    ingress:
      app:
        className: internal
        hosts:
          - host: &host claw.mcgrath.nz
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
        tls:
          - hosts:
              - *host
      codeserver:
        className: internal
        hosts:
          - host: &codehost claw-code.mcgrath.nz
            paths:
              - path: /
                service:
                  identifier: codeserver
                  port: http
        tls:
          - hosts:
              - *codehost
    rbac:
      roles:
        openclaw-read-all:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods", "nodes", "services", "namespaces", "configmaps", "persistentvolumes", "persistentvolumeclaims", "endpoints", "resourcequotas", "limitranges", "serviceaccounts", "events"]  # Added events
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["pods/log"]
              verbs: ["get", "list"]
            - apiGroups: ["apps"]
              resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources: ["storageclasses"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["external-secrets.io"]
              resources: ["externalsecrets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["volsync.backube"]
              resources: ["replicationsources", "replicationdestinations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["postgresql.cnpg.io"]
              resources: ["clusters", "backups", "scheduledbackups"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["autoscaling.k8s.io"]
              resources: ["verticalpodautoscalers"]
              verbs: ["get", "list", "watch"]
        openclaw-cluster-ops:
          type: ClusterRole
          rules:
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["patch", "update"]
            - apiGroups: [""]
              resources: ["persistentvolumes"]
              verbs: ["delete", "patch"]
        openclaw-write-restricted:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["delete"]
            - apiGroups: ["batch"]
              resources: ["jobs"]
              verbs: ["delete"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["patch", "update"]
      bindings:
        openclaw-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-read-all
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        openclaw-cluster-ops:
          type: ClusterRoleBinding
          roleRef:
            identifier: openclaw-cluster-ops
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
        openclaw-write-restricted:
          type: RoleBinding
          roleRef:
            identifier: openclaw-write-restricted
          subjects:
            - identifier: openclaw
              serviceAccount: openclaw
    serviceAccount:
      openclaw: {}
    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: *homepath
      data:
        type: nfs
        server: 172.20.0.1
        path: /volume1/Data/claw
        globalMounts:
          - path: /data
      # openclaw-config:
      #   type: secret
      #   name: "{{ .Release.Name }}-config"
      #   globalMounts:
      #     - path: /home/node/.openclaw/openclaw.json
      #       subPath: openclaw.json
