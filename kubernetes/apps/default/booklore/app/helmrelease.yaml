---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: booklore
spec:
  chartRef:
    kind: OCIRepository
    name: booklore
  interval: 30m
  dependsOn:
    - name: booklore-mariadb
      namespace: default
  values:
    controllers:
      booklore:
        annotations:
          reloader.stakater.com/auto: "true"
        pod:
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch
            runAsGroup: 1000
            runAsNonRoot: true
            runAsUser: 1000
            supplementalGroups: [65537]
        containers:
          booklore:
            image:
              repository: ghcr.io/booklore-app/booklore
              tag: v2.1.0
            env:
              TZ: Pacific/Auckland
              DATABASE_URL: "jdbc:mariadb://booklore-mariadb.default.svc.cluster.local:3306/booklore"
              DATABASE_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: booklore-secret
                    key: DATABASE_USERNAME
              DATABASE_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: booklore-secret
                    key: DATABASE_PASSWORD
              SWAGGER_ENABLED: "false"
            probes:
              liveness: &probe
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/healthcheck
                    port: &port 6060
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness: *probe
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 512Mi
              limits:
                memory: 1Gi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                drop:
                  - ALL
    persistence:
      config:
        existingClaim: booklore
        globalMounts:
          - path: /app/data
      media:
        type: nfs
        server: 172.20.0.1
        path: /volume1/Media
        advancedMounts:
          booklore:
            booklore:
              - path: /books
                subPath: Books/library
              - path: /bookdrop
                subPath: Books/bookdrop
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
    service:
      app:
        controller: booklore
        ports:
          http:
            port: *port
    ingress:
      app:
        className: internal
        hosts:
          - host: booklore.mcgrath.nz
            paths:
              - path: /
                service:
                  identifier: app
                  port: http
