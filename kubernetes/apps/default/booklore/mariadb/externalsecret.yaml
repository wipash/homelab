---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name booklore-secret
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: *name
    template:
      engineVersion: v2
      data:
        # Booklore
        DATABASE_USERNAME: "{{ .BOOKLORE_DB_USERNAME }}"
        DATABASE_PASSWORD: "{{ .BOOKLORE_DB_PASSWORD }}"

        # MariaDB
        mariadb-root-password: "{{ .BOOKLORE_DB_ROOT_PASSWORD }}"
        mariadb-password: "{{ .BOOKLORE_DB_PASSWORD }}"

  dataFrom:
    - extract:
        key: booklore
