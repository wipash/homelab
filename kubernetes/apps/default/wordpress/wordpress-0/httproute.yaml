---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: wordpress-0
  namespace: default
spec:
  parentRefs:
    - name: envoy-external
      namespace: networking
      sectionName: https
  hostnames:
    - "${SECRET_WP_0_DOMAIN}"
    - "www.${SECRET_WP_0_DOMAIN}"
  rules:
    - backendRefs:
        - name: wordpress-0
          port: 80
