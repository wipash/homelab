---
# Configuration version (required)
version: 1.3.9

# Cache settings: Set to true to enable caching
cache: true

# Custom interface configuration
interface:
  endpointsMenu: false
  modelSelect: true
  parameters: false
  sidePanel: true
  presets: false
  bookmarks: true
  multiConvo: true
  runCode: true
  webSearch: true
  peoplePicker:
    users: true
    groups: true
    roles: true
  marketplace:
    use: true
  fileCitations: true
  prompts:
    use: true
    create: true
    share: true
    public: true
  agents:
    use: true
    create: true
    share: true
    public: true
  skills:
    use: true
    create: true
    share: true
    public: true
  remoteAgents:
    use: true
    create: true
  mcpServers:
    use: true
    create: true
    share: true
    public: true
    trustCheckbox:
      label: I understand and I want to continue
      subLabel: Malicious MCP servers may attempt to steal your data or trick the model into taking unintended actions, including destroying data.

balance:
  enabled: false

transactions:
  enabled: false

speech:
  speechTab:
    conversationMode: false
    advancedMode: false
    speechToText:
      engineSTT: openai
      languageSTT: "English (New Zealand)"
      autoTranscribeAudio: true
      autoSendText: 0
    textToSpeech:
      engineTTS: openai
      voice: alloy
      languageTTS: "en"
      automaticPlayback: false
      playbackRate: 1.0
      cacheTTS: true
  tts:
    openai:
      apiKey: "$${SPEECH_API_KEY}"
      model: "tts-1"
      voices: ["alloy", "echo", "fable", "onyx", "nova", "shimmer"]
  stt:
    openai:
      apiKey: "$${SPEECH_API_KEY}"
      model: whisper-1

rateLimits:
  fileUploads:
    #ipMax: 100
    #ipWindowInMinutes: 60  # Rate limit window for file uploads per IP
    userMax: 100
    userWindowInMinutes: 30 # Rate limit window for file uploads per user
  # conversationsImport:
  #   ipMax: 100
  #   ipWindowInMinutes: 60 # Rate limit window for conversation imports per IP
  #   userMax: 50
  #   userWindowInMinutes: 60 # Rate limit window for conversation imports per user

fileConfig:
  endpoints:
    agents:
      fileLimit: 100
      supportedMimeTypes:
        - "^application/pdf$"
        - "^application/vnd\\.openxmlformats-officedocument\\.(wordprocessingml\\.document|presentationml\\.presentation|spreadsheetml\\.sheet)$"
        - "^application/vnd\\.ms-(word|powerpoint|excel)$"
        - "^application/vnd\\.ms-(excel|powerpoint|word)\\..+\\.macro[eE]nabled\\.12$"
        - "^application/epub\\+zip$"
        - "text/.*"
        - "image/.*"
  serverFileSizeLimit: 200
  avatarSizeLimit: 2
  imageGeneration:
    px: 1600
  clientImageResize:
    enabled: true
    maxWidth: 1900
    maxHeight: 1900
    quality: 0.92

ocr:
  mistralModel: mistral-ocr-latest
  apiKey: "$${MISTRAL_API_KEY}"
  strategy: mistral_ocr

webSearch:
  serperApiKey: "$${SERPER_API_KEY}"
  searchProvider: "serper"

  scraperProvider: "firecrawl"
  firecrawlApiKey: "$${FIRECRAWL_API_KEY}"
  firecrawlOptions:
    formats: ["markdown", "summary"]
    excludeTags: ["nav", "footer", ".ads"]
    waitFor: 2000
    timeout: 10000
    mobile: false
    blockAds: true
    onlyMainContent: true
    removeBase64Images: true
    maxAge: 172800000 # 48 hours in milliseconds

  cohereApiKey: "$${COHERE_API_KEY}"
  rerankerType: "cohere"

  scraperTimeout: 20000
  safeSearch: 1

endpoints:
  custom:
    - name: LiteLLM
      apiKey: "$${LITELLM_API_KEY}"
      baseURL: "https://litellm.hlms.cloud"
      models:
        default: ["gpt-5.4-nano"]
        fetch: true
      titleConvo: true
      titleModel: gpt-5.4-nano
      modelDisplayLabel: LiteLLM

    - name: LiteLLMAnthropic
      apiKey: "$${LITELLM_API_KEY}"
      baseURL: "https://litellm.hlms.cloud"
      provider: anthropic
      models:
        default: ["claude-sonnet-4-6"]
        fetch: true
      titleConvo: true
      titleModel: gpt-5.4-nano
      titleEndpoint: LiteLLM
      modelDisplayLabel: LiteLLM Anthropic

  agents:
    recursionLimit: 50
    disableBuilder: false
    titleConvo: true
    titleModel: gpt-5.4-nano
    titleEndpoint: LiteLLM
    capabilities:
      - execute_code
      - file_search
      - actions
      - tools
      - artifacts
      - ocr
      - chain
      - web_search
      - context
      - deferred_tools
      - programmatic_tools
      - subagents
      - skills
    allowedProviders:
      - LiteLLM

  assistants:
    disableBuilder: true

  all:
    streamRate: 10 # Higher number slows down incoming tokens so that we don't overwhelm the cpu
    titleConvo: true
    titleModel: gpt-5.4-nano
    titleEndpoint: LiteLLM

modelSpecs:
  enforce: false
  prioritize: true
  addedEndpoints: ["agents", "LiteLLM"]
  list:
    - name: claude
      label: Claude
      description: Anthropic Claude
      iconURL: https://holmesazaepubshare.blob.core.windows.net/logosandicons/sherlock/claude.png
      showIconInMenu: true
      showIconInHeader: true
      default: false
      preset:
        endpoint: agents
        agent_id: agent_6SgjYIhwhpWodbr3XeYGn
        modelLabel: Claude

    - name: gpt
      label: GPT
      description: OpenAI GPT
      iconURL: https://holmesazaepubshare.blob.core.windows.net/logosandicons/sherlock/chatgpt-blue.png
      showIconInMenu: true
      showIconInHeader: true
      default: false
      preset:
        endpoint: agents
        agent_id: agent_K7CjEugZnIVs-9Kxycxpn
        modelLabel: GPT

    - name: gemini
      label: Gemini
      description: Google Gemini
      iconURL: "https://holmesazaepubshare.blob.core.windows.net/pub/gemini.png"
      showIconInMenu: true
      showIconInHeader: true
      default: false
      preset:
        endpoint: agents
        agent_id: agent_-AFN7SdqfbUc-aoC8Yix4
        modelLabel: Gemini
