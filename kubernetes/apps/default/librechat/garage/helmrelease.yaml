---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: garage
spec:
  chartRef:
    kind: OCIRepository
    name: garage
  interval: 1h
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  uninstall:
    keepHistory: false
  values:
    controllers:
      garage:
        type: statefulset
        annotations:
          reloader.stakater.com/auto: "true"
          secret.reloader.stakater.com/reload: &secret garage-secret
          configmap.reloader.stakater.com/reload: &config garage-config
        statefulset:
          volumeClaimTemplates:
            - name: data
              accessMode: ReadWriteOnce
              size: 20Gi
              storageClass: ceph-block
              globalMounts:
                - path: /var/lib/garage
        containers:
          app:
            image:
              repository: dxflrs/garage
              tag: v2.3.0
            command:
              - /garage
            args:
              - server
              - --single-node
              - --default-bucket
            env:
              GARAGE_CONFIG_FILE: /config/garage.toml
            envFrom:
              - secretRef:
                  name: *secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: garage
        ports:
          s3:
            port: 3900
          admin:
            port: 3903

    persistence:
      config:
        type: configMap
        name: *config
        globalMounts:
          - path: /config
            readOnly: true
