---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librechat-admin
spec:
  chartRef:
    kind: OCIRepository
    name: librechat-admin
  interval: 1h
  values:
    controllers:
      librechat-admin:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/clickhouse/librechat-admin-panel
              tag: latest@sha256:4b74b0bbdcc117c86a2484f1acbd1c21450f546671a7dd17d6ec220b0a2dd590
            env:
              TZ: Pacific/Auckland
              PORT: "3000"
              VITE_API_BASE_URL: https://chat.mcgrath.nz
              API_SERVER_URL: http://librechat.default.svc.cluster.local:3080
              SESSION_COOKIE_SECURE: "true"
            envFrom:
              - secretRef:
                  name: librechat-admin-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 512Mi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: librechat-admin
        ports:
          http:
            port: 3000

    route:
      app:
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - chatadmin.mcgrath.nz

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp
