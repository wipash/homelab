---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: librechat-admin
spec:
  chartRef:
    kind: OCIRepository
    name: librechat-admin
  interval: 1h
  values:
    controllers:
      librechat-admin:
        type: deployment
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/clickhouse/librechat-admin-panel
              # Rolled back from :latest (bb70b66) due to config page failing
              # with "Server function module export not resolved" — all exports
              # of src/server/config.ts evaluate to undefined.
              # This tag corresponds to upstream commit 8ceace79 (PR #46).
              tag: 8ceace79b2237ccfa6ae1a3027c8920244e007b0@sha256:683e29eca6d9f03392c761d16a76b92fd3a6cdecff90d0962433aba156e93d81
            env:
              TZ: Pacific/Auckland
              PORT: "3000"
              VITE_API_BASE_URL: https://chat.mcgrath.nz
              API_SERVER_URL: http://librechat.default.svc.cluster.local:3080
              SESSION_COOKIE_SECURE: "true"
            envFrom:
              - secretRef:
                  name: librechat-admin-secret
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
                memory: 192Mi
              limits:
                memory: 512Mi
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: false

    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      app:
        controller: librechat-admin
        ports:
          http:
            port: 3000

    route:
      app:
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - chatadmin.mcgrath.nz

    persistence:
      tmp:
        type: emptyDir
        globalMounts:
          - path: /tmp

      logs:
        type: emptyDir
        globalMounts:
          - path: /app/logs
