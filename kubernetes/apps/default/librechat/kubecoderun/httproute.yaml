---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: kubecoderun
  namespace: default
  annotations:
    gatus.home-operations.com/enabled: "false"
spec:
  parentRefs:
    - name: envoy-internal
      namespace: networking
      sectionName: https
  hostnames:
    - kubecoderun.mcgrath.nz
  rules:
    - backendRefs:
        - name: kubecoderun
          port: 8000
