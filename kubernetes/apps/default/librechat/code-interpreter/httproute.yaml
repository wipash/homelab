---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: code-interpreter
  namespace: default
  annotations:
    gatus.home-operations.com/enabled: "false"
spec:
  parentRefs:
    - name: envoy-internal
      namespace: networking
      sectionName: https
  hostnames:
    - code-interpreter.mcgrath.nz
  rules:
    - backendRefs:
        - name: code-interpreter
          port: 8000
