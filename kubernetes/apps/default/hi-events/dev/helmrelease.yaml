---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hi-events-dev
spec:
  chartRef:
    kind: OCIRepository
    name: hi-events-dev
  interval: 1h
  values:
    controllers:
      hi-events-dev:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: 18
            envFrom: &envFrom
              - secretRef:
                  name: "{{ .Release.Name }}-secret"
        containers:
          app:
            image:
              repository: ghcr.io/wipash/hi.events
              tag: v1.7.100
            env:
              TZ: Pacific/Auckland
              LOG_CHANNEL: stderr
            envFrom: *envFrom
            probes:
              liveness:
                enabled: true
              readiness:
                enabled: true
              startup:
                enabled: true
                spec:
                  failureThreshold: 30
                  periodSeconds: 5
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi

          mailpit:
            image:
              repository: ghcr.io/axllent/mailpit
              tag: v1.29.7@sha256:757f22b56c1da03570afdb3d259effe5091018008a81bbedc8158cee7e16fdbc
            env:
              TZ: Pacific/Auckland


    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 82 # www-data, required for serversideup/php base image
        runAsGroup: 82
        fsGroup: 82
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
    service:
      app:
        ports:
          http:
            port: 8080
      mailpit:
        ports:
          http:
            port: 8025
    route:
      app:
        parentRefs:
          - name: envoy-external
            namespace: networking
            sectionName: https
        hostnames:
          - events-dev.mcgrath.nz
        rules:
          - backendRefs:
              - identifier: app
                port: http
      mailpit:
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - events-dev-mailpit.mcgrath.nz
        rules:
          - backendRefs:
              - identifier: mailpit
                port: http
    persistence:
      storage:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /app/backend/storage

      laravel-cache:
        type: emptyDir
        globalMounts:
          - path: /app/backend/bootstrap/cache

      htmlpurifier-cache:
        type: emptyDir
        globalMounts:
          - path: /app/backend/vendor/ezyang/htmlpurifier/library/HTMLPurifier/DefinitionCache/Serializer

      nginx-data:
        type: emptyDir
        globalMounts:
          - path: /var/lib/nginx

      run:
        type: emptyDir
        globalMounts:
          - path: /var/run

      home-www-data:
        type: emptyDir
        globalMounts:
          - path: /home/www-data

      tmp:
        type: emptyDir
