---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: changedetection
spec:
  chartRef:
    kind: OCIRepository
    name: changedetection
  interval: 1h
  values:
    controllers:
      changedetection:
        containers:
          app:
            image:
              repository: ghcr.io/dgtlmoon/changedetection.io
              tag: 0.55.8@sha256:5438423d5e906eff4e8f7886823482ad23f472bf7b8530ccaca89fb48c337882
            env:
              TZ: Pacific/Auckland
              PORT: &port 5000
              USE_X_SETTINGS: 1
              FETCH_WORKERS: 3
              PLAYWRIGHT_DRIVER_URL: ws://localhost:3000/
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
            # securityContext:
            #   allowPrivilegeEscalation: false
            #   capabilities: { drop: ["ALL"] }
            #   readOnlyRootFilesystem: true

          browser:
            image:
              repository: ghcr.io/browserless/chromium
              tag: v2.54.2@sha256:8da772c56e5b64937a48447e988d1d42319809dd562098b0d08ee3c0f259d619
              pullPolicy: IfNotPresent
            env:
              TIMEOUT: "60000"
              # headroom above FETCH_WORKERS: each check can open more than one
              # CDP connection, and connections beyond the limit are refused
              CONCURRENT: "6"

            resources:
              requests:
                cpu: 100m
                memory: 1100Mi

            # securityContext:
            #   allowPrivilegeEscalation: false

    # defaultPodOptions:
    #   securityContext:
    #     runAsNonRoot: true
    #     runAsUser: 1000
    #     runAsGroup: 1000
    #     fsGroup: 1000
    #     fsGroupChangePolicy: OnRootMismatch

    service:
      app:
        controller: changedetection
        ports:
          http:
            port: *port

    route:
      app:
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - "{{ .Release.Name }}.mcgrath.nz"

    persistence:
      config:
        existingClaim: "{{ .Release.Name }}"
        advancedMounts:
          changedetection:
            app:
              - path: /datastore
                subPath: changedetection

      tmp:
        type: emptyDir
        medium: Memory
        sizeLimit: 2Gi
