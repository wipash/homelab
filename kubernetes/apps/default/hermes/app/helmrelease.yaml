---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: hermes
  interval: 1h
  values:
    controllers:
      hermes:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: latest@sha256:c44189a91fb1023f85798e5f676c431b862c8bcf1a11f9489c67208f9a76e33f
            args:
              - gateway
              - run
            env:
              HOME: /opt/data
              TZ: &tz Pacific/Auckland
            envFrom:
              - secretRef:
                  name: hermes-secret
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 3Gi
      codeserver:
        containers:
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.112.0@sha256:ddd9b0b854fec5a3c65ec0095b5c59fb8505ad44d8a18d00d6fcf6a3179692dd
            env:
              TZ: *tz
            args:
              [
                "--auth",
                "none",
                "--user-data-dir",
                "/opt/data/.vscode",
                "--extensions-dir",
                "/opt/data/.vscode",
                "--port",
                "12321",
                "/opt/data",
              ]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi

    defaultPodOptions:
      securityContext:
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      codeserver:
        controller: codeserver
        ports:
          http:
            port: 12321

    route:
      codeserver:
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - hermes.mcgrath.nz
        rules:
          - backendRefs:
              - identifier: codeserver
                port: http

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      tmp:
        type: emptyDir

    rbac:
      roles:
        hermes-read-all:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods", "nodes", "services", "namespaces", "configmaps", "persistentvolumes", "persistentvolumeclaims", "endpoints", "resourcequotas", "limitranges", "serviceaccounts", "events"]  # Added events
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["pods/log"]
              verbs: ["get", "list"]
            - apiGroups: ["apps"]
              resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources: ["storageclasses"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["external-secrets.io"]
              resources: ["externalsecrets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["volsync.backube"]
              resources: ["replicationsources", "replicationdestinations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["postgresql.cnpg.io"]
              resources: ["clusters", "backups", "scheduledbackups"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["autoscaling.k8s.io"]
              resources: ["verticalpodautoscalers"]
              verbs: ["get", "list", "watch"]
        hermes-cluster-ops:
          type: ClusterRole
          rules:
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["patch", "update"]
            - apiGroups: [""]
              resources: ["persistentvolumes"]
              verbs: ["delete", "patch"]
        hermes-write-restricted:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["delete"]
            - apiGroups: ["batch"]
              resources: ["jobs"]
              verbs: ["delete"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["patch", "update"]
      bindings:
        hermes-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-read-all
          subjects:
            - identifier: hermes
              serviceAccount: hermes
        hermes-cluster-ops:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-cluster-ops
          subjects:
            - identifier: hermes
              serviceAccount: hermes
        hermes-write-restricted:
          type: RoleBinding
          roleRef:
            identifier: hermes-write-restricted
          subjects:
            - identifier: hermes
              serviceAccount: hermes
    serviceAccount:
      hermes: {}
