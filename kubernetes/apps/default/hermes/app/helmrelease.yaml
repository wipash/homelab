---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hermes
spec:
  chartRef:
    kind: OCIRepository
    name: hermes
  interval: 1h
  values:
    controllers:
      hermes:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: nousresearch/hermes-agent
              tag: v2026.5.29@sha256:192a40783e9227b5f162b76af4d133050557adebd46e1c9cb40cb79a1317a9f7
            args:
              - gateway
              - run
              - --replace
            env:
              TZ: &tz Pacific/Auckland
              HOME: /opt/data
              HERMES_HOME: /opt/data
              # Run the dashboard under s6 in THIS container (not a sidecar): the
              # dashboard manages the gateway via s6-svc on the local /run/service
              # tree, so it must share the gateway's container to see/restart it.
              # HOST/PORT default to 0.0.0.0:9119. INSECURE opts out of the OAuth
              # gate (trusted LAN behind Envoy); TUI exposes the in-browser Chat tab.
              HERMES_DASHBOARD: "1"
              HERMES_DASHBOARD_INSECURE: "1"
              HERMES_DASHBOARD_TUI: "1"
            envFrom:
              - secretRef:
                  name: hermes-secret
            probes:
              liveness:
                enabled: false
              readiness:
                enabled: false
              startup:
                enabled: false
            securityContext:
              # Don't drop capabilities: s6-overlay init runs as root and needs
              # CAP_CHOWN (fix /opt/data ownership) plus CAP_SETUID/CAP_SETGID to
              # drop privileges to the image's hermes user (10000). Dropping ALL
              # breaks both ("chown failed", "unable to set supplementary group list").
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
            resources:
              requests:
                cpu: 100m
                memory: 1Gi
              limits:
                memory: 3Gi
      codeserver:
        strategy: Recreate
        # hermes owns its home (/opt/data) as uid 10000, mode 0700, and resets it on
        # start, so the default coder user (1000) can't enter even via the fsGroup.
        # Run code-server as the hermes user so it owns the workspace it edits.
        # (coder image isn't s6-based, so forcing the uid is safe.)
        pod:
          securityContext:
            runAsUser: 10000
            runAsGroup: 10000
        containers:
          codeserver:
            image:
              repository: ghcr.io/coder/code-server
              tag: 4.122.0@sha256:dbe5b1cf5c1f0edf47da6363fdadb89c456fb14b3d7e2a1545cabe20f5d7402a
            env:
              TZ: *tz
              HOME: /opt/data
            args:
              [
                "--auth",
                "none",
                "--user-data-dir",
                "/opt/data/.vscode",
                "--extensions-dir",
                "/opt/data/.vscode",
                "--port",
                "12321",
                "/opt/data",
              ]
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 1Gi

    defaultPodOptions:
      automountServiceAccountToken: true
      securityContext:
        # hermes-agent uses s6-overlay: its entrypoint must start as root to fix
        # /run permissions, then drops to the image's internal hermes user (uid 10000).
        # Forcing runAsUser breaks s6 preinit ("/run belongs to uid 0 ... lacking
        # privileges to fix it"), so only set fsGroup to match the image user.
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }

    service:
      hermes:
        controller: hermes
        ports:
          dashboard:
            port: 9119
      codeserver:
        controller: codeserver
        ports:
          http:
            port: 12321

    route:
      hermes:
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - hermes.mcgrath.nz
        rules:
          # The dashboard hardcodes its CORS/origin allow-list to localhost only, so
          # the WebSocket handshake (Origin: https://hermes.mcgrath.nz) is rejected
          # with 403. Rewrite Origin to an allowed value; the browser doesn't enforce
          # CORS on the WS upgrade, so this only satisfies the server-side check.
          - filters:
              - type: RequestHeaderModifier
                requestHeaderModifier:
                  set:
                    - name: Origin
                      value: http://localhost:9119
            backendRefs:
              - identifier: hermes
                port: dashboard
      codeserver:
        parentRefs:
          - name: envoy-internal
            namespace: networking
            sectionName: https
        hostnames:
          - hermesconf.mcgrath.nz
        rules:
          - backendRefs:
              - identifier: codeserver
                port: http

    persistence:
      data:
        existingClaim: "{{ .Release.Name }}"
        globalMounts:
          - path: /opt/data
      tmp:
        type: emptyDir

    rbac:
      roles:
        hermes-read-all:
          type: ClusterRole
          rules:
            - apiGroups: [""]
              resources: ["pods", "nodes", "services", "namespaces", "configmaps", "persistentvolumes", "persistentvolumeclaims", "endpoints", "resourcequotas", "limitranges", "serviceaccounts", "events"]  # Added events
              verbs: ["get", "list", "watch"]
            - apiGroups: [""]
              resources: ["pods/log"]
              verbs: ["get", "list"]
            - apiGroups: ["apps"]
              resources: ["deployments", "daemonsets", "statefulsets", "replicasets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["batch"]
              resources: ["jobs", "cronjobs"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["networking.k8s.io"]
              resources: ["ingresses", "networkpolicies"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources: ["storageclasses"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["rbac.authorization.k8s.io"]
              resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["metrics.k8s.io"]
              resources: ["nodes", "pods"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["kustomize.toolkit.fluxcd.io"]
              resources: ["kustomizations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["external-secrets.io"]
              resources: ["externalsecrets"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["volsync.backube"]
              resources: ["replicationsources", "replicationdestinations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["postgresql.cnpg.io"]
              resources: ["clusters", "backups", "scheduledbackups"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["autoscaling.k8s.io"]
              resources: ["verticalpodautoscalers"]
              verbs: ["get", "list", "watch"]
        hermes-cluster-ops:
          type: ClusterRole
          rules:
            - apiGroups: ["helm.toolkit.fluxcd.io"]
              resources: ["helmreleases"]
              verbs: ["patch", "update"]
            - apiGroups: [""]
              resources: ["persistentvolumes"]
              verbs: ["delete", "patch"]
        hermes-write-restricted:
          type: Role
          rules:
            - apiGroups: [""]
              resources: ["pods"]
              verbs: ["delete"]
            - apiGroups: ["batch"]
              resources: ["jobs"]
              verbs: ["delete"]
            - apiGroups: [""]
              resources: ["pods/exec"]
              verbs: ["create"]
            - apiGroups: ["apps"]
              resources: ["deployments"]
              verbs: ["patch", "update"]
      bindings:
        hermes-read-all:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-read-all
          subjects:
            - identifier: hermes
              serviceAccount: hermes
        hermes-cluster-ops:
          type: ClusterRoleBinding
          roleRef:
            identifier: hermes-cluster-ops
          subjects:
            - identifier: hermes
              serviceAccount: hermes
        hermes-write-restricted:
          type: RoleBinding
          roleRef:
            identifier: hermes-write-restricted
          subjects:
            - identifier: hermes
              serviceAccount: hermes
    serviceAccount:
      hermes: {}
