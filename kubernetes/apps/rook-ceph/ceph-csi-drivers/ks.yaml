---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ceph-csi-drivers
  namespace: flux-system
spec:
  interval: 1h
  # The Driver/OperatorConfig CRs need the csi.ceph.io CRDs shipped by the
  # rook-ceph operator chart, so order this after it on cold bootstraps.
  dependsOn:
    - name: rook-ceph
      namespace: flux-system
  path: ./kubernetes/apps/rook-ceph/ceph-csi-drivers/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-cluster
  targetNamespace: rook-ceph
