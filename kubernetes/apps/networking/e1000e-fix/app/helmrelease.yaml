---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: e1000e-fix
spec:
  chartRef:
    kind: OCIRepository
    name: e1000e-fix
  interval: 1h
  values:
    controllers:
      e1000e-fix:
        type: daemonset
        pod:
          automountServiceAccountToken: false
          enableServiceLinks: false
          hostNetwork: true
          hostPID: true
          nodeSelector:
            feature.node.kubernetes.io/custom-e1000e: "true"
        containers:
          app:
            image:
              repository: ghcr.io/nicolaka/netshoot
              tag: v0.16@sha256:b09d9b21381f47a79b3cbcb30da25266dc17186ea00ae65e99fdc51396f48e70
            env:
              TZ: Pacific/Auckland
            command: ["/bin/bash", "-c"]
            args:
              - |
                find /sys/class/net/*/device/driver/module/drivers -maxdepth 1 -path "*e1000e*" | \
                awk -F'/' '{print $5}' | \
                xargs -I% sh -c "
                  echo '% - BEFORE' && \
                  echo '==========' && \
                  ethtool -k % && \
                  echo '==========' && \
                  echo 'Disabling offloads for %...' && \
                  ethtool -K % tso off && \
                  echo '==========' && \
                  echo '% - AFTER' && \
                  echo '==========' && \
                  ethtool -k % && \
                  echo '=========='
                " && \
                sleep infinity
            securityContext:
              privileged: true
            resources:
              requests:
                cpu: 10m
              limits:
                memory: 10Mi
    persistence:
      procfs:
        type: hostPath
        hostPath: /proc
        hostPathType: Directory
        globalMounts:
          - path: /host/proc
            readOnly: true
      netfs:
        type: hostPath
        hostPath: /sys
        hostPathType: Directory
        globalMounts:
          - path: /host/net
            readOnly: true
