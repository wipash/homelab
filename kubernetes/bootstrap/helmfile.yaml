---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

# Bootstraps core applications that provide a minimal runtime base for the
# cluster. Values are read from each app's HelmRelease via
# templates/values.yaml.gotmpl so the HelmRelease stays the single source
# of truth. After this phase, Flux takes over management of everything.

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

repositories:
  - name: cilium
    url: https://helm.cilium.io
  - name: coredns
    url: https://coredns.github.io/helm
  - name: postfinance
    url: https://postfinance.github.io/kubelet-csr-approver

releases:
  - name: prometheus-operator-crds
    namespace: monitoring
    chart: oci://ghcr.io/prometheus-community/charts/prometheus-operator-crds
    version: 30.0.1

  - name: cilium
    namespace: kube-system
    chart: cilium/cilium
    version: 1.19.5
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - monitoring/prometheus-operator-crds

  - name: coredns
    namespace: kube-system
    chart: coredns/coredns
    version: 1.46.0
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - kube-system/cilium

  - name: kubelet-csr-approver
    namespace: kube-system
    chart: postfinance/kubelet-csr-approver
    version: 1.2.14
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - kube-system/coredns

  - name: spegel
    namespace: kube-system
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.7.4
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - kube-system/kubelet-csr-approver

  - name: flux-operator
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.55.0
    values:
      - ./templates/values.yaml.gotmpl
      # The web UI HTTPRoute needs Gateway API CRDs, which don't exist yet;
      # the HelmRelease enables it once Flux deploys envoy-gateway
      - web:
          httpRoute:
            enabled: false
    needs:
      - kube-system/spegel

  - name: flux-instance
    namespace: flux-system
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.55.0
    values:
      - ./templates/values.yaml.gotmpl
    needs:
      - flux-system/flux-operator
