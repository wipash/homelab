---
# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

vars:
  BOOTSTRAP_RESOURCES_DIR: "{{.ROOT_DIR}}/.taskfiles/bootstrap/resources"

tasks:

  kubernetes:
    desc: Bootstrap a Talos Kubernetes cluster backed by flux, sops, and rook
    prompt: Bootstrap a Talos Kubernetes cluster ... continue?
    summary: |
      cluster: Talos context to run command against (default: main)
      nodes: Nodes in the cluster to reset Rook on (required, comma delimited, e.g. hp1,hp2,hp3)
      disk: Disk to reset Rook on (required, e.g. /dev/nvme0n1)
    vars: &vars
      cluster: '{{.cluster | default "main"}}'
      nodes: "{{.nodes}}"
      disk: "{{.disk}}"
    cmds:
      - { task: etcd, vars: *vars }
      - { task: kubeconfig, vars: *vars }
      - { task: apps, vars: *vars }
      - { task: rook, vars: *vars }
      # Applying the sops-age secret is what unblocks cluster-vars and lets
      # cluster-apps start deploying, so it runs after the Rook disk wipe
      - { task: flux, vars: *vars }
    requires:
      vars: ["nodes", "disk"]
    preconditions:
      - talosctl --context {{.cluster}} config info >/dev/null 2>&1

  etcd:
    internal: true
    vars:
      CONTROLLER:
        sh: talosctl --context {{.cluster}} config info --output yaml | yq --exit-status '.endpoints[0]'
    cmd: until talosctl --context {{.cluster}} --nodes {{.CONTROLLER}} bootstrap; do sleep 10; done
    preconditions:
      - talosctl --context {{.cluster}} config info >/dev/null 2>&1

  kubeconfig:
    internal: true
    vars:
      CONTROLLER:
        sh: talosctl --context {{.cluster}} config info --output yaml | yq --exit-status '.endpoints[0]'
    cmd: |
      talosctl --context {{.cluster}} kubeconfig --nodes {{.CONTROLLER}} \
          --force --force-context-name {{.cluster}} ~/.kube/config
    preconditions:
      - talosctl --context {{.cluster}} config info >/dev/null 2>&1

  apps:
    internal: true
    cmds:
      - until kubectl --context {{.cluster}} wait --for=condition=Ready=False nodes --all --timeout=10m; do sleep 10; done
      - helmfile --quiet --kube-context {{.cluster}} --file {{.KUBERNETES_DIR}}/bootstrap/helmfile.yaml sync --hide-notes
      - until kubectl --context {{.cluster}} wait --for=condition=Ready nodes --all --timeout=10m; do sleep 10; done
    preconditions:
      - test -f {{.KUBERNETES_DIR}}/bootstrap/helmfile.yaml
      - talosctl --context {{.cluster}} config info >/dev/null 2>&1

  flux:
    internal: true
    cmds:
      - kubectl --context {{.cluster}} get namespace flux-system >/dev/null 2>&1 || kubectl --context {{.cluster}} create namespace flux-system
      - |
        kubectl --context {{.cluster}} create secret generic sops-age --namespace flux-system \
            --from-file=age.agekey=$SOPS_AGE_KEY_FILE \
            --dry-run=client --output yaml | kubectl --context {{.cluster}} apply --server-side --filename -
      - sops --decrypt {{.KUBERNETES_DIR}}/flux/vars/cluster-secrets.sops.yaml | kubectl --context {{.cluster}} apply --server-side --filename -
      - kubectl --context {{.cluster}} apply --server-side --filename {{.KUBERNETES_DIR}}/flux/vars/cluster-settings.yaml
    preconditions:
      - test -f $SOPS_AGE_KEY_FILE
      - test -f {{.KUBERNETES_DIR}}/flux/vars/cluster-settings.yaml
      - test -f {{.KUBERNETES_DIR}}/flux/vars/cluster-secrets.sops.yaml
      - sops filestatus {{.KUBERNETES_DIR}}/flux/vars/cluster-secrets.sops.yaml | jq --exit-status '.encrypted'

  rook:
    internal: true
    vars: &vars
      cluster: '{{.cluster}}'
      node: '{{.ITEM}}'
      disk: '{{.disk}}'
    cmds:
      - for: { var: nodes }
        task: rook-data
        vars: *vars
      - for: { var: nodes }
        task: rook-disk
        vars: *vars

  rook-disk:
    internal: true
    cmds:
      - $GOPATH/bin/envsubst < <(cat {{.BOOTSTRAP_RESOURCES_DIR}}/rook-disk-job.tmpl.yaml) | kubectl --context {{.cluster}} apply -f -
      - bash {{.BOOTSTRAP_RESOURCES_DIR}}/wait-for-job.sh {{.job}} default {{.cluster}}
      - kubectl --context {{.cluster}} --namespace default wait job/{{.job}} --for condition=complete --timeout=1m
      - kubectl --context {{.cluster}} --namespace default logs job/{{.job}}
      - kubectl --context {{.cluster}} --namespace default delete job {{.job}}
    env:
      disk: '{{.disk}}'
      job: '{{.job}}'
      node: '{{.node}}'
    vars:
      job: wipe-disk-{{.node}}
    preconditions:
      - test -f $GOPATH/bin/envsubst
      - test -f {{.BOOTSTRAP_RESOURCES_DIR}}/wait-for-job.sh
      - test -f {{.BOOTSTRAP_RESOURCES_DIR}}/rook-disk-job.tmpl.yaml

  rook-data:
    internal: true
    cmds:
      - $GOPATH/bin/envsubst < <(cat {{.BOOTSTRAP_RESOURCES_DIR}}/rook-data-job.tmpl.yaml) | kubectl --context {{.cluster}} apply -f -
      - bash {{.BOOTSTRAP_RESOURCES_DIR}}/wait-for-job.sh {{.job}} default {{.cluster}}
      - kubectl --context {{.cluster}} --namespace default wait job/{{.job}} --for condition=complete --timeout=1m
      - kubectl --context {{.cluster}} --namespace default logs job/{{.job}}
      - kubectl --context {{.cluster}} --namespace default delete job {{.job}}
    env:
      disk: '{{.disk}}'
      job: '{{.job}}'
      node: '{{.node}}'
    vars:
      job: wipe-data-{{.node}}
    preconditions:
      - test -f $GOPATH/bin/envsubst
      - test -f {{.BOOTSTRAP_RESOURCES_DIR}}/wait-for-job.sh
      - test -f {{.BOOTSTRAP_RESOURCES_DIR}}/rook-data-job.tmpl.yaml
